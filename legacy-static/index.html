<!DOCTYPE html>
<html lang="es">
<head>

    <title>Bienestar Universitario - Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

            display: block;
            margin: 15px 0;
            padding: 15px;
            font-size: 1.1rem;

        }
        .student-entry {
            background-color: #00796b;
        }

        <h2>Sistema de Gestión</h2>

        <p style="margin-top: 20px; margin-bottom: 30px; color: #555;">Seleccione su perfil de acceso para visualizar las interfaces desarrolladas.</p>
        
        <a href="admin_dashboard.html" class="login-btn admin-entry">Ingresar como <strong>Administrador</strong></a>
        <a href="estudiante_solicitudes.html" class="login-btn student-entry">Ingresar como <strong>Estudiante</strong></a>

</html>
