<div class="container">
	<header class="module-hero">
		<div>
			<p class="module-kicker">Agenda personal</p>
			<h2>Mis citas</h2>
			<p>Revise sus atenciones programadas y el profesional asignado.</p>
		</div>
	</header>

	<section class="request-list request-list--cards">
		@for (item of citas(); track item.id) {
			<article class="student-request-card">
				<span class="request-card__top"><strong>{{ item.type }}</strong><span class="badge" [ngClass]="statusClass(item)">{{ item.status }}</span></span>
				<div class="detail-grid">
					<div><span>Profesional</span><strong>{{ item.professionalName }}</strong></div>
					<div><span>Fecha</span><strong>{{ item.date }}</strong></div>
					<div><span>Hora</span><strong>{{ item.time }}</strong></div>
				</div>
			</article>
		}
	</section>
</div>
